# SMART Challenge 2026 — training hyperparameters
# Edit before each experiment; values are logged to runs/<experiment>/

model: yolov8m-obb.pt     # start with medium; swap to yolov11m-obb.pt for final run
epochs: 100
imgsz: 1280               # native frame resolution is ~1920x1080; 1280 is a safe trade-off
batch: 8                  # reduce if GPU OOM; 8 works on 8 GB VRAM with imgsz=1280
device: 0                 # GPU index; use 'cpu' locally, 0 on Kaggle/Colab T4
workers: 4
patience: 20              # early stopping

# Optimizer
optimizer: AdamW
lr0: 0.001
lrf: 0.01                 # final lr = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3

# Augmentation (most handled by ultralytics built-ins)
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10.0
translate: 0.1
scale: 0.5
fliplr: 0.5
flipud: 0.0
mosaic: 1.0
mixup: 0.1
copy_paste: 0.1

# Class imbalance — manual weights fed via train.py (relative, not absolute)
# auto=1, combi=4, microbus=4, minibus=4, omnibus=6, articulado=10, camion=4, mototaxi=10, motocicleta=4
cls_weights: [1, 4, 4, 4, 6, 10, 4, 10, 4]

# Submission thresholds
conf_threshold: 0.15      # low → high recall; AP metric benefits from keeping weak detections
iou_threshold: 0.45       # NMS IoU for OBB
max_det_per_frame: 300    # cap to avoid evaluator rejection
